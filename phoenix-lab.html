<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phoenix Texture Lab</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .lab-container { display: flex; gap: 20px; padding: 20px; height: 95vh; }
        .editor-side { width: 350px; display: flex; flex-direction: column; gap: 15px; }
        .preview-side {
            flex: 1;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
            background-size: 20px 20px;
        }
        canvas {
            width: 320px;
            height: 320px;
            image-rendering: pixelated;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }
        .layer-card {
            background: var(--input);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent);
        }
        .layer-stack { overflow-y: auto; flex: 1; }
    </style>
</head>
<body>
<div class="lab-container">
    <aside class="editor-side">
        <section class="card">
            <h3 style="color:var(--accent)">Phoenix Texture Lab</h3>
            <div class="grid-2">
                <div>
                    <label class="small-label">Primary Hex</label>
                    <input type="text" id="pColor" value="FFE100">
                </div>
                <div>
                    <label class="small-label">Secondary Hex</label>
                    <input type="text" id="sColor" value="FFFFFF">
                </div>
            </div>
        </section>

        <section class="card layer-stack">
            <h3>Material Layers</h3>
            <div id="layerList"></div>
            <button class="secondary-btn" style="width:100%; margin-top:10px;" onclick="addLayer()">+ Add Layer</button>
        </section>

        <button class="secondary-btn" style="border-color: #4caf50; color: #4caf50;" onclick="downloadResult()">
            Export Tinted Texture (.png)
        </button>
    </aside>

    <main class="preview-side">
        <canvas id="phoenixCanvas" width="32" height="32"></canvas>
        <p style="margin-top: 20px; color: #555; font-family: var(--font);">32x32 PIXEL PREVIEW</p>
    </main>
</div>
<script src="phoenix-lab.js"></script>
</body>
</html>
